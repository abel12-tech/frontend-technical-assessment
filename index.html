<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Assessment</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>

<body>
    <header class="sticky-nav">
        <nav class="nav" role="navigation" aria-label="Main Navigation">
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-list" tabindex="0">
                <span class="hamburger" aria-hidden="true"></span>
            </button>
            <ul id="nav-list" class="nav-list" role="menubar">
                <li role="none"><a href="#nav-section" class="nav-link active" role="menuitem" tabindex="0" aria-current="page">Navigation</a></li>
                <li role="none"><a href="#drag-section" class="nav-link" role="menuitem" tabindex="0">Drag & Drop</a></li>
                <li role="none"><a href="#list-section" class="nav-link" role="menuitem" tabindex="0">Blog List</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="nav-section" tabindex="-1" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h2 style="margin-bottom: 12px;">Navigation Component</h2>
            <p style="max-width: 480px; text-align: center; margin-bottom: 16px;">This section demonstrates the sticky navigation with intersection/observer.<br>Scroll to see the navigation update and highlight the viewed section.</p>
        </section>
        <section id="drag-section" tabindex="-1" style="height: 100vh; display: flex; align-items: flex-end; justify-content: center;">
            <h2 style="margin-bottom: 12px;">Drag & Drop Demo</h2>
        </section>
        <section id="list-section" tabindex="-1" style="height: 100vh; display: flex; align-items: flex-end; justify-content: center;">
            <h2 style="margin-bottom: 12px;">Blog List Demo</h2>
        </section>
    </main>
    <script type="module" src="src/js/main.js"></script>
</body>

</html>
